<!-- templates/year_filter_modal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year Filter</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
  }

  /* Background overlay */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Modal dialog */
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 20px 25px;
    width: 540px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    position: relative;
  }

  .modal h3 {
    margin-top: 0;
    margin-bottom: 15px;
  }

  /* Close button */
  .close-btn {
    position: absolute;
    right: 12px;
    top: 12px;
    background: transparent;
    border: none;
    font-size: 20px;
    cursor: pointer;
  }

  /* Buttons */
  .year-btn, .apply-btn, .clear-btn {
    display: block;
    width: 150px;
    padding: 8px 12px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }

  .year-btn {
    background: #f0f0f0;
  }

  .year-btn:hover {
    background: #e0e0e0;
  }

  .apply-btn, .clear-btn {
    background: #ff5c5c;
    color: #fff;
  }

  .apply-btn:hover, .clear-btn:hover {
    background: #ff3b3b;
  }

  /* Custom range inputs */
  .custom-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 5px;
  }

  #customBtn {
    width: 150px;
    flex-shrink: 0;
  }

  .custom-range {
    display: none;
    flex: 1;
    gap: 8px;
    align-items: center;
  }

  .custom-range.visible {
    display: flex;
  }

  .custom-range input {
    flex: 1;
    min-width: 60px;
    padding: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    text-align: center;
  }

  .custom-range span {
    flex-shrink: 0;
  }

  .custom-range button.apply-btn {
    flex-shrink: 0;
    width: auto;
  }
  #docTypesContainer {
  display: flex;
  flex-direction: column;
  align-items: flex-start;   /* left align everything */
  gap: 6px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
</style>
</head>
<body>

<div id="typesModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <button class="close-btn" >×</button>

    <form id="docForm">
     <div id="docTypesContainer">
        {% for t in types %}
          <div class="checkbox-row">
            <input type="checkbox"
                  name="doc_types"
                  id="typ_{{ t['key'] }}"
                  value="{{ t['key'] }}">
            <label for="typ_{{ t['key'] }}">
              {{ t['key'] }} ({{ t['doc_count'] }})
            </label>
          </div>
        {% endfor %}
    </div>

      <button type="submit">Apply</button>
    </form>
  </div>
</div>

<div id="topicsModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <button class="close-btn" >×</button>

    <form id="docForm">
     <div id="docTypesContainer">
        {% for t,v in topics.items() %}
        {%set t1=t.replace("https://openalex.org/","")%}
          <div class="checkbox-row">
            <input type="checkbox"
                  name="doc_types"
                  id="typ_{{ t1 }}"
                  value="{{ t }}">
            <label for="typ_{{ t1 }}">
              {{ v[0] }} ({{ v[1] }})
            </label>
          </div>
        {% endfor %}
    </div>

      <button type="submit">Apply</button>
    </form>
  </div>
</div>

<div id="conceptsModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <button class="close-btn" >×</button>

    <form id="docForm">
     <div id="docTypesContainer">
        {% for t,v in concepts.items() %}
        {%set t1=t.replace("https://openalex.org/","")%}
          <div class="checkbox-row">
            <input type="checkbox"
                  name="doc_types"
                  id="typ_{{ t1 }}"
                  value="{{ t }}">
            <label for="typ_{{ t1 }}">
              {{ v[0] }} ({{ v[1] }})
            </label>
          </div>
        {% endfor %}
    </div>

      <button type="submit">Apply</button>
    </form>
  </div>
</div>

<div id="langModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <button class="close-btn" >×</button>

    <form id="docForm">
     <div id="docTypesContainer">
        {% for t in  languages %}
        
         <div class="checkbox-row">
            <input type="checkbox"
                  name="doc_types"
                  id="typ_{{ t['key'] }}"
                  value="{{ t['key'] }}">
            <label for="typ_{{ t['key'] }}">
              {{ t['key'] }} ({{ t['doc_count'] }})
            </label>
          </div>
        {% endfor %}
    </div>

      <button type="submit">Apply</button>
    </form>
  </div>
</div>


<div class="modal-overlay" id="yearsModal" style="display:none">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h3>Year Filter</h3>

    <form method="post" id="yearsForm" action="/set_year_filter" >
      <!-- Preset buttons -->
      <button type="submit" name="opt" value="2025" class="year-btn">Since 2025</button>
      <button type="submit" name="opt" value="2020" class="year-btn">Since 2020</button>

      <!-- Custom range -->
      
     
        <div class="custom-row">
          <button type="button" class="year-btn" id="customBtn">Custom range...</button>
          <div class="custom-range" id="customRangeDiv" >
            <input type="number" name="year_from" min="1900" max="2100" value="2000">
            <span>-</span>
            <input type="number" name="year_to" min="1900" max="2100" value="2100">
            <button type="submit" name="opt" class="apply-btn" value="2">Apply</button>
          </div>
      </div>

      <!-- Clear button -->
      <button type="submit" name="opt" value="0" class="clear-btn">Clear</button>
    </form>
  </div>
</div>

<script>
  const customBtn = document.getElementById('customBtn');
  const customRangeDiv = document.getElementById('customRangeDiv');
  const yearsmodal = document.getElementById('yearsModal');

  customBtn.addEventListener('click', () => {
    customRangeDiv.classList.toggle('visible');
  });

  //function closeModal() {
  //  yearsmodal.style.display = 'none';
  //}

  document.getElementById("yearsForm").onsubmit = async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
if (e.submitter?.name) {
    formData.append(e.submitter.name, e.submitter.value);
  }
  for (const [k,v] of formData.entries()) {
    console.log(">>", k, v);
  }
  const res = await fetch("/set_year_filter", {
    method: "POST",
    body: formData
  });
  const data = await res.json();
  if (data.success) {
     const modal = e.target.closest(".modal-overlay");
    closeModal(modal);
  }
};



function closeModal(modal) {
  if (!modal) return;
  modal.style.display = "none";
}
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("close-btn")) {
    const modal = e.target.closest(".modal-overlay");
    closeModal(modal);
  }
});
</script>

</body>
</html>
