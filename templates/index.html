<!DOCTYPE html>
<html>
    <style>
    .filter-row {
        margin: 4px 0;
        display: flex;
        gap: 6px;
        align-items: center;
    }
    </style>
<head>
  <title>Elastic Search UI</title>
  <script>
   function addFilter() {
  const div = document.createElement("div");
  div.className = "filter-row";
  div.innerHTML = `
    <select name="field[]" onchange="onFieldChange(this)">
      {% for f in search_fields %}
      <option value="{{f}}">{{f}}</option>
      {% endfor %}
    </select>
    <span class="value-container">
      <input type="text" name="value[]" />
    </span>
    <button type="button" onclick="removeFilter(this)">🗑</button>
  `;
  document.getElementById("filters").appendChild(div);
}

  function onFieldChange(sel) {
    const field = sel.value;
    const row = sel.closest(".filter-row");
    const container = row.querySelector(".value-container");
    const index = document.getElementById("index").value;
    const smallFields = {{ small_fields|tojson }};

    // publication_year => range inputs
    if (field === "publication_year") {
      container.innerHTML = `
        <input type="number" name="year_from[]" placeholder="From" style="width:90px" />
        <input type="number" name="year_to[]" placeholder="To" style="width:90px" />
      `;
      return;
    }

    // small_fields => aggregation dropdown
    if (smallFields.includes(field)) {
      fetch(`/aggregations/${index}/${field}`)
        .then(r => r.json())
        .then(data => {
          const select = document.createElement("select");
          select.name = "value[]";
          data.forEach(v => {
            const o = document.createElement("option");
            o.value = v;
            o.text = v;
            select.appendChild(o);
          });
          container.innerHTML = "";
          container.appendChild(select);
        });
      return;
    }

    // default => text input
    container.innerHTML = `<input type="text" name="value[]" />`;
  }
    function handleMainSearch(e) {
  if (e.key === "Enter") {
    e.preventDefault();

    const value = e.target.value.trim();
    if (!value) return;

    const div = document.createElement("div");
    div.className = "filter-row";
    div.innerHTML = `
      <select name="field[]">
        <option value="abstract+title" selected>abstract+title</option>
      </select>
      <input type="text" name="value[]" value="${value.replace(/"/g, "&quot;")}" />
      <button type="button" onclick="removeFilter(this)">🗑</button>
    `;
    document.getElementById("filters").appendChild(div);
    e.target.value = "";
  }
}
  window.onload = () => {
  document.querySelectorAll("select[name='field[]']").forEach(sel => {
    onFieldChange(sel);
  });
};
 function removeFilter(btn) {
    const row = btn.closest(".filter-row");
    if (row) row.remove();
  }
  </script>
</head>
<body>
<form method="POST">
 <select name="index" id="index">
  {% for i in indexes %}
    <option value="{{i}}" {% if i == selected_index %}selected{% endif %}>{{i}}</option>
  {% endfor %}
</select>

  <input
  type="text"
  id="mainSearch"
  name="q"
  placeholder="Search..."
  value="{{ q }}"
  onkeydown="handleMainSearch(event)"
/>

  <button type="button" onclick="addFilter()">Add filter</button>

  <div id="filters">
  {% for f in filters %}
    <div class="filter-row">
      <select name="field[]" onchange="onFieldChange(this)">
        {% for sf in search_fields %}
          <option value="{{sf}}" {% if sf == f.field %}selected{% endif %}>{{sf}}</option>
        {% endfor %}
        <option value="abstract+title" {% if f.field == "abstract+title" %}selected{% endif %}>
          abstract+title
        </option>
      </select>

        {% if f.field == "publication_year" %}
        <span class="value-container">
            <input type="number" name="year_from[]" value="{{ f.from }}" placeholder="From" style="width:90px" />
            <input type="number" name="year_to[]" value="{{ f.to }}" placeholder="To" style="width:90px" />
        </span>
        {% else %}
        <span class="value-container">
            <input type="text" name="value[]" value="{{ f.value }}" />
        </span>
        {% endif %}

      <button type="button" onclick="removeFilter(this)">🗑</button>
    </div>
  {% endfor %}
</div>
  <button type="submit">Search</button>
</form>

<hr/>

<table border="1">
  <tr>
    {% for f in displayed_fields %}
    <th>{{f}}</th>
    {% endfor %}
  </tr>

  {% for r in results %}
  <tr>
    {% for f in displayed_fields %}
    <td>{{ r.get(f, "") }}</td>
    {% endfor %}
  </tr>
  {% endfor %}
</table>
</body>
</html>
